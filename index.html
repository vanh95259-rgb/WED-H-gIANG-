<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hà Giang Tour</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f4f4;
}

header {
    background: #111;
    color: white;
    padding: 40px;
    text-align: center;
}

section {
    padding: 40px;
    max-width: 1000px;
    margin: auto;
}

.card {
    background: white;
    padding: 20px;
    margin: 20px 0;
    border-radius: 10px;
}

img {
    width: 100%;
    border-radius: 10px;
}
</style>

</head>

<body>

<header>
    <h1>Hà Giang Tour</h1>
    <p>Sống Nhớ Quê - Hà Giang</p>
</header>

<section>

<div class="card">
    <img src="https://images.unsplash.com/photo-1600077103909-3c8d3c7c3c6f">
    <h2>Sông Nho Quế</h2>
</div>

<div class="card">
    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
    <h2>Đèo Mã Pí Lèng</h2>
</div>

<div class="card">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
    <h2>Cao nguyên đá Đồng Văn</h2>
</div>

</section>

</body>
</html>
