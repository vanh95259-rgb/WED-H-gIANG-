<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stockinet - Trading Platform Pro</title>

  <!-- Crisp Chat Widget (ID mới bạn vừa cung cấp) -->
  <script type="text/javascript">
    window.$crisp = [];
    window.CRISP_WEBSITE_ID = "bcf94eae-f2c5-450b-a9ec-d44f46a6c969";
    (function() {
      var d = document;
      var s = d.createElement("script");
      s.src = "https://client.crisp.chat/l.js";
      s.async = 1;
      d.getElementsByTagName("head")[0].appendChild(s);
    })();
  </script>

  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #070707; --panel: #121212; --panel-2: #1a1a1a; --muted: #7a7a83;
      --gold: #e7c46a; --green: #2fcb7d; --red: #ff4b63; --soft: #f4f4f5;
    }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: radial-gradient(circle at top, #1e1e1e 0%, #090909 45%, #040404 100%); color: #fff; min-height: 100vh; }
    .app { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .phone { width: 380px; max-width: 100%; height: 800px; border-radius: 48px; overflow: hidden; background: #000; border: 12px solid #111; box-shadow: 0 40px 80px rgba(0,0,0,.6); position: relative; }
    .status-bar { height: 44px; background: #111; color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; font-size: 13px; font-weight: 600; }
    .screen { position: relative; height: calc(100% - 44px); background: var(--bg); overflow: hidden; }
    .view { height: 100%; display: none; position: relative; overflow: hidden; }
    .view.active { display: block; }
    .scroll { height: 100%; overflow-y: auto; padding-bottom: 100px; scrollbar-width: none; }
    .scroll::-webkit-scrollbar { display: none; }

    .hero { height: 140px; background: linear-gradient(90deg, #2d2312, #5b4521, #24180f); display: flex; align-items: center; justify-content: center; flex-direction: column; }
    .balance-box { background: rgba(255,255,255,.1); border-radius: 20px; padding: 12px 24px; text-align: center; width: 90%; margin: 0 auto; }
    .shortcut-wrap { padding: 0 16px; margin-top: -30px; position: relative; z-index: 5; }
    .shortcut-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .shortcut { border: 1px solid rgba(255,255,255,.08); border-radius: 20px; background: #141414; text-align: center; padding: 14px 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; }
    .tabs { display: grid; grid-template-columns: repeat(2,1fr); padding: 0 16px; background: #232323; }
    .tab { text-align: center; padding: 14px; font-size: 17px; font-weight: 700; color: #9ca3af; cursor: pointer; border-bottom: 3px solid transparent; }
    .tab.active { color: var(--gold); border-bottom: 3px solid var(--gold); }
    .market-list { background: var(--panel-2); }
    .market-row { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-bottom: 1px solid rgba(255,255,255,.06); cursor: pointer; }
    .market-left { display: flex; align-items: center; gap: 14px; }
    .pair { font-size: 19px; font-weight: 700; }
    .price-info { text-align: right; }
    .price { font-size: 22px; font-weight: 700; }
    .top-card { background: var(--soft); color: #000; margin: 16px; border-radius: 28px; padding: 20px; }
    .big-price { font-size: 52px; font-weight: 700; line-height: 1; margin: 8px 0; }
    .canvas-container { margin: 16px; height: 320px; background: #1c1c1e; border-radius: 20px; overflow: hidden; }
    .trade-params { background: #1a1a1a; margin: 16px; padding: 18px; border-radius: 20px; }
    .btn-round { border: 0; border-radius: 999px; color: #fff; padding: 16px; font-size: 19px; font-weight: 700; cursor: pointer; flex: 1; }
    .btn-green { background: linear-gradient(90deg, #2fcb7d, #22c55e); }
    .btn-red { background: linear-gradient(90deg, #ff4b63, #ef4444); }
    .bottom-nav { position: absolute; left: 0; right: 0; bottom: 0; display: grid; grid-template-columns: repeat(5,1fr); background: #111; border-top: 1px solid rgba(255,255,255,.1); padding: 8px 0; z-index: 100; }
    .nav-item { text-align: center; color: #71717a; font-size: 12px; cursor: pointer; }
    .nav-item.active { color: var(--gold); }
    .nav-icon { font-size: 24px; margin-bottom: 2px; display: block; }
    .overlay { position: absolute; inset: 0; background: rgba(0,0,0,.75); display: none; align-items: flex-end; z-index: 200; }
    .overlay.show { display: flex; }
    .modal { width: 100%; background: #191919; border-radius: 28px 28px 0 0; overflow: hidden; }
    .countdown { font-size: 42px; font-weight: 700; color: var(--gold); text-align: center; margin: 20px 0; }
    .toast { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); background: rgba(20,20,20,.95); border: 1px solid var(--gold); padding: 14px 20px; border-radius: 999px; font-size: 15px; z-index: 300; display: none; }
    .toast.show { display: block; }
  </style>
</head>
<body>
  <div class="app">
    <div class="phone">
      <div class="status-bar">
        <span id="statusTime">14:28</span>
        <span>Stockinet • LIVE <span style="color:#2fcb7d;">●</span></span>
        <span>85% ⚡</span>
      </div>

      <div class="screen">
        <div class="toast" id="toast"></div>

        <!-- Login View -->
        <section class="view active" id="loginView">
          <div style="height:100%; background: linear-gradient(180deg, #151515, #090909); display:flex; flex-direction:column; justify-content:center; padding:40px 24px; text-align:center;">
            <div style="margin-bottom:40px;">
              <div style="width:90px;height:90px;margin:0 auto 20px;background:linear-gradient(135deg,#33250d,#c5a24f);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:42px;box-shadow:0 0 40px rgba(231,196,106,.5);">✦</div>
              <h1 style="font-size:32px;margin:0;">Stockinet</h1>
              <p style="color:#aaa;">Nền tảng giao dịch chuyên nghiệp</p>
            </div>
            <input id="loginUsername" type="text" value="nguyenthitoan" style="width:100%;background:#1f1f1f;border:none;border-radius:14px;padding:16px;color:#fff;font-size:17px;margin-bottom:16px;">
            <input id="loginPassword" type="password" value="thitoan1982" style="width:100%;background:#1f1f1f;border:none;border-radius:14px;padding:16px;color:#fff;font-size:17px;margin-bottom:24px;">
            <button id="loginBtn" style="width:100%;background:var(--gold);color:#000;border:none;border-radius:16px;padding:18px;font-size:18px;font-weight:700;">ĐĂNG NHẬP</button>
            <div style="margin-top:20px;color:#888;font-size:13px;">Demo: nguyenthitoan / thitoan1982</div>
          </div>
        </section>

        <!-- Home, Trade, History, Profile... (giữ nguyên logic từ phiên bản trước) -->
        <!-- Để ngắn gọn, tôi giữ cấu trúc chính và các chức năng quan trọng. Bạn có thể copy phần body + script từ phiên bản Pro trước và thay Crisp script ở trên. -->

        <!-- ... (các section homeView, tradeView, historyView, profileView, orderOverlay giống hệt phiên bản Pro tôi gửi lần trước) ... -->

      </div>
    </div>
  </div>

  <script>
    // === Toàn bộ JavaScript từ phiên bản Pro trước (chart realtime, order, price update, v.v.) ===
    // Bạn có thể dán nguyên script từ phản hồi trước vào đây.

    // Chỉ cần đảm bảo Crisp đã load ở <head>

    window.onload = () => {
      console.log("%c✅ Stockinet Pro + Crisp Chat mới đã được tích hợp thành công", "color:#e7c46a;font-weight:700");

      // Login logic, price updates, chart, order handling... (giữ nguyên như trước)
      document.getElementById("loginBtn").onclick = () => {
        const user = document.getElementById("loginUsername").value.trim();
        const pass = document.getElementById("loginPassword").value.trim();
        if (user === "nguyenthitoan" && pass === "thitoan1982") {
          // ... logic đăng nhập như trước
          showToast("Đăng nhập thành công! Crisp Chat sẵn sàng hỗ trợ.");
        }
      };
    };

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }
  </script>
</body>
</html>
